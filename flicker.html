<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SH-GS Flicker Comparison</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', Arial, sans-serif;
    background: #1a1a2e;
    color: #e0e0e0;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
    padding: 40px 20px;
  }
  h1 { font-size: 2rem; margin-bottom: 10px; color: #fff; }
  .roughness-section {
    width: 100%;
    max-width: 900px;
    margin-bottom: 50px;
  }
  .roughness-title {
    font-size: 1.6rem;
    text-align: center;
    margin-bottom: 30px;
    color: #7eb8da;
    border-bottom: 1px solid #333;
    padding-bottom: 10px;
  }
  .comparison { margin-bottom: 40px; }
  .scene-title {
    font-size: 1.2rem;
    text-align: center;
    margin-bottom: 16px;
    color: #aaa;
  }
  .flicker-row {
    display: flex;
    gap: 30px;
    justify-content: center;
    padding: 0 10px;
  }
  .flicker-box {
    text-align: center;
    max-width: 400px;
  }
  .flicker-box .label {
    font-size: 1.1rem;
    font-weight: 600;
    margin-bottom: 8px;
    height: 1.4em;
  }
  .flicker-box img {
    display: block;
    width: 100%;
    height: auto;
    border: 2px solid #333;
    border-radius: 4px;
  }
  .flicker-box .frame-indicator {
    text-align: center;
    margin-top: 8px;
    font-size: 0.85rem;
    color: #666;
  }

  @media (max-width: 600px) {
    h1 { font-size: 1.4rem; }
    .roughness-title { font-size: 1.2rem; }
    .flicker-row {
      flex-direction: column;
      align-items: center;
      gap: 30px;
    }
    .flicker-box { max-width: 90vw; }
  }
</style>
</head>
<body>

<nav style="margin-bottom:20px;font-size:1rem;">
  <a href="index.html" style="color:#aaa;margin-right:20px;">Image Comparison</a>
  <a href="flicker.html" style="color:#7eb8da;margin-right:20px;font-weight:bold;">Flicker Test</a>
  <a href="timing.html" style="color:#aaa;">Timing Chart</a>
</nav>
<h1>SH-GS: Flicker Test</h1>

<div id="container"></div>

<script>
  const scenes = [
    { id: 'hr-boma',    section: 'High Roughness', scene: 'Boma',    basePath: 'images/High_Roughness/Boma/' },
    { id: 'hr-default', section: 'High Roughness', scene: 'Default', basePath: 'images/High_Roughness/Default/' },
    { id: 'lr-boma',    section: 'Low Roughness',  scene: 'Boma',    basePath: 'images/Low_Roughness/Boma/' },
    { id: 'lr-default', section: 'Low Roughness',  scene: 'Default', basePath: 'images/Low_Roughness/Default/' },
  ];

  // 4 frames: GS -> SplitSum -> GS -> Ours
  const ssFrames = [
    { label: 'GS',       img: 'gs.png' },
    { label: 'SplitSum', img: 'ss.png' },
    { label: 'GS',       img: 'gs.png' },
    { label: 'SplitSum', img: 'ss.png' },
  ];

  const oursFrames = [
    { label: 'GS',   img: 'gs.png' },
    { label: 'Ours', img: 'combo.png' },
    { label: 'GS',   img: 'gs.png' },
    { label: 'Ours', img: 'combo.png' },
  ];

  const FRAME_DURATION = 1500;
  const container = document.getElementById('container');

  // Group by section
  const sections = {};
  scenes.forEach(s => {
    if (!sections[s.section]) sections[s.section] = [];
    sections[s.section].push(s);
  });

  Object.entries(sections).forEach(([sectionName, sceneList]) => {
    const sectionDiv = document.createElement('div');
    sectionDiv.className = 'roughness-section';
    sectionDiv.innerHTML = '<div class="roughness-title">' + sectionName + '</div>';

    sceneList.forEach(scene => {
      const html = `
        <div class="comparison">
          <div class="scene-title">${scene.scene}</div>
          <div class="flicker-row">
            <div class="flicker-box">
              <div class="label" id="${scene.id}-ss-label">GS</div>
              <img id="${scene.id}-ss-img" src="${scene.basePath}gs.png" alt="SplitSum flicker">
              <div class="frame-indicator" id="${scene.id}-ss-ind">Frame 1 / 4</div>
            </div>
            <div class="flicker-box">
              <div class="label" id="${scene.id}-ours-label">GS</div>
              <img id="${scene.id}-ours-img" src="${scene.basePath}gs.png" alt="Ours flicker">
              <div class="frame-indicator" id="${scene.id}-ours-ind">Frame 1 / 4</div>
            </div>
          </div>
        </div>`;
      sectionDiv.insertAdjacentHTML('beforeend', html);
    });

    container.appendChild(sectionDiv);
  });

  scenes.forEach(scene => {
    let frame = 0;
    const ssLabel  = document.getElementById(scene.id + '-ss-label');
    const ssImg    = document.getElementById(scene.id + '-ss-img');
    const ssInd    = document.getElementById(scene.id + '-ss-ind');
    const oursLabel = document.getElementById(scene.id + '-ours-label');
    const oursImg   = document.getElementById(scene.id + '-ours-img');
    const oursInd   = document.getElementById(scene.id + '-ours-ind');

    function tick() {
      const sf = ssFrames[frame];
      const of = oursFrames[frame];
      ssLabel.textContent   = sf.label;
      ssImg.src             = scene.basePath + sf.img;
      ssInd.textContent     = 'Frame ' + (frame + 1) + ' / ' + ssFrames.length;
      oursLabel.textContent = of.label;
      oursImg.src           = scene.basePath + of.img;
      oursInd.textContent   = 'Frame ' + (frame + 1) + ' / ' + oursFrames.length;
      frame = (frame + 1) % ssFrames.length;
    }

    tick();
    setInterval(tick, FRAME_DURATION);
  });
</script>

</body>
</html>
