<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SH-GS Flicker Comparison</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', Arial, sans-serif;
    background: #1a1a2e;
    color: #e0e0e0;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
    padding: 40px 20px;
  }
  h1 { font-size: 2rem; margin-bottom: 10px; color: #fff; }
  .roughness-section {
    width: 100%;
    max-width: 900px;
    margin-bottom: 50px;
  }
  .roughness-title {
    font-size: 1.6rem;
    text-align: center;
    margin-bottom: 30px;
    color: #7eb8da;
    border-bottom: 1px solid #333;
    padding-bottom: 10px;
  }
  .comparison { margin-bottom: 40px; }
  .scene-title {
    font-size: 1.2rem;
    text-align: center;
    margin-bottom: 16px;
    color: #aaa;
  }
  .flicker-wrapper {
    display: flex;
    align-items: flex-start;
    justify-content: center;
    gap: 16px;
  }
  .side-label {
    font-size: 1rem;
    color: #aaa;
    min-width: 80px;
    text-align: right;
    margin-top: 2em;
  }
  .flicker-box {
    text-align: center;
    flex: 1;
    max-width: 350px;
    min-width: 0;
  }
  .flicker-box .label {
    font-size: 1.1rem;
    font-weight: 600;
    margin-bottom: 8px;
    height: 1.4em;
  }
  .flicker-box img {
    display: block;
    width: 100%;
    height: auto;
    border: 2px solid #333;
    border-radius: 4px;
  }
  .frame-indicator {
    text-align: center;
    margin-top: 8px;
    font-size: 0.85rem;
    color: #666;
  }

  @media (max-width: 600px) {
    h1 { font-size: 1.4rem; }
    .roughness-title { font-size: 1.2rem; }
    .flicker-box { max-width: 90vw; }
  }
</style>
</head>
<body>

<nav style="margin-bottom:20px;font-size:1rem;">
  <a href="index.html" style="color:#aaa;margin-right:20px;">Image Comparison</a>
  <a href="flicker.html" style="color:#7eb8da;margin-right:20px;font-weight:bold;">Flicker Test</a>
  <a href="timing.html" style="color:#aaa;margin-right:20px;">Timing Chart</a>
  <a href="videos.html" style="color:#aaa;">Videos</a>
</nav>
<h1>SH-GS: Flicker Test</h1>

<div id="container"></div>

<script>
  const scenes = [
    { id: 'lr-bathroom',    scene: 'Bathroom',    basePath: 'images/Low_Roughness/Bathroom/' },
    { id: 'lr-kitchen',     scene: 'Kitchen',     basePath: 'images/Low_Roughness/Kitchen/' },
    { id: 'lr-library',     scene: 'Library',     basePath: 'images/Low_Roughness/Library/' },
    { id: 'lr-livingroom',  scene: 'Living Room', basePath: 'images/Low_Roughness/Living Room/' },
  ];

  const cacheBust = '?v=' + Date.now();

  // Base frames
  const baseFrames = [
    { label: 'GS',       sideLabel: 'SplitSum', img: 'gs.png',    diffImg: 'diff_ss.png',    diffLabel: '|GS − SplitSum|' },
    { label: 'SplitSum', sideLabel: 'SplitSum', img: 'ss.png',    diffImg: 'diff_ss.png',    diffLabel: '|GS − SplitSum|' },
    { label: 'GS',       sideLabel: 'Ours',     img: 'gs.png',    diffImg: 'diff_combo.png', diffLabel: '|GS − Ours|' },
    { label: 'Ours',     sideLabel: 'Ours',     img: 'combo.png', diffImg: 'diff_combo.png', diffLabel: '|GS − Ours|' },
  ];

  // Build sequence: 1,2 repeated 6 times then 3,4 repeated 6 times
  const frames = [];
  for (let i = 0; i < 6; i++) { frames.push(baseFrames[0]); frames.push(baseFrames[1]); }
  for (let i = 0; i < 6; i++) { frames.push(baseFrames[2]); frames.push(baseFrames[3]); }

  const FRAME_DURATION = 750;
  const container = document.getElementById('container');

  scenes.forEach(scene => {
    const html = `
      <div class="comparison">
        <div class="scene-title">${scene.scene}</div>
        <div class="flicker-wrapper">
          <div class="side-label" id="${scene.id}-side">SplitSum</div>
          <div class="flicker-box">
            <div class="label" id="${scene.id}-label">GS</div>
            <img id="${scene.id}-img" src="${scene.basePath}gs.png${cacheBust}" alt="Flicker">
          </div>
          <div class="flicker-box">
            <div class="label" id="${scene.id}-diff-label">|GS − SplitSum|</div>
            <img id="${scene.id}-diff-img" src="${scene.basePath}diff_ss.png${cacheBust}" alt="Difference">
          </div>
        </div>
      </div>`;
    container.insertAdjacentHTML('beforeend', html);
  });

  scenes.forEach(scene => {
    let frame = 0;
    const label    = document.getElementById(scene.id + '-label');
    const side     = document.getElementById(scene.id + '-side');
    const img      = document.getElementById(scene.id + '-img');
    const diffLabel = document.getElementById(scene.id + '-diff-label');
    const diffImg   = document.getElementById(scene.id + '-diff-img');

    function tick() {
      const f = frames[frame];
      label.textContent     = f.label;
      side.textContent      = f.sideLabel;
      img.src               = scene.basePath + f.img + cacheBust;
      diffLabel.textContent = f.diffLabel;
      diffImg.src           = scene.basePath + f.diffImg + cacheBust;
      frame = (frame + 1) % frames.length;
    }

    tick();
    setInterval(tick, FRAME_DURATION);
  });
</script>

</body>
</html>
