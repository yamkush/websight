<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SH-GS Flicker Comparison</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', Arial, sans-serif;
    background: #1a1a2e;
    color: #e0e0e0;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
    padding: 40px 20px;
  }
  h1 { font-size: 2rem; margin-bottom: 10px; color: #fff; }
  .roughness-section {
    width: 100%;
    max-width: 900px;
    margin-bottom: 50px;
  }
  .roughness-title {
    font-size: 1.6rem;
    text-align: center;
    margin-bottom: 30px;
    color: #7eb8da;
    border-bottom: 1px solid #333;
    padding-bottom: 10px;
  }
  .comparison { margin-bottom: 40px; }
  .scene-title {
    font-size: 1.2rem;
    text-align: center;
    margin-bottom: 16px;
    color: #aaa;
  }
  .flicker-wrapper {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 16px;
  }
  .side-label {
    font-size: 1rem;
    color: #aaa;
    min-width: 80px;
    text-align: right;
  }
  .flicker-box {
    text-align: center;
    max-width: 450px;
  }
  .flicker-box .label {
    font-size: 1.1rem;
    font-weight: 600;
    margin-bottom: 8px;
    height: 1.4em;
  }
  .flicker-box img {
    display: block;
    width: 100%;
    height: auto;
    border: 2px solid #333;
    border-radius: 4px;
  }
  .frame-indicator {
    text-align: center;
    margin-top: 8px;
    font-size: 0.85rem;
    color: #666;
  }

  @media (max-width: 600px) {
    h1 { font-size: 1.4rem; }
    .roughness-title { font-size: 1.2rem; }
    .flicker-box { max-width: 90vw; }
  }
</style>
</head>
<body>

<nav style="margin-bottom:20px;font-size:1rem;">
  <a href="index.html" style="color:#aaa;margin-right:20px;">Image Comparison</a>
  <a href="flicker.html" style="color:#7eb8da;margin-right:20px;font-weight:bold;">Flicker Test</a>
  <a href="timing.html" style="color:#aaa;">Timing Chart</a>
</nav>
<h1>SH-GS: Flicker Test</h1>

<div id="container"></div>

<script>
  const scenes = [
    { id: 'hr-boma',        section: 'High Roughness', scene: 'Boma',        basePath: 'images/High_Roughness/Boma/' },
    { id: 'hr-default',     section: 'High Roughness', scene: 'Default',     basePath: 'images/High_Roughness/Default/' },
    { id: 'lr-bathroom',    section: 'Low Roughness',  scene: 'Bathroom',    basePath: 'images/Low_Roughness/Bathroom/' },
    { id: 'lr-boma',        section: 'Low Roughness',  scene: 'Boma',        basePath: 'images/Low_Roughness/Boma/' },
    { id: 'lr-default',     section: 'Low Roughness',  scene: 'Default',     basePath: 'images/Low_Roughness/Default/' },
    { id: 'lr-kitchen',     section: 'Low Roughness',  scene: 'Kitchen',     basePath: 'images/Low_Roughness/Kitchen/' },
    { id: 'lr-library',     section: 'Low Roughness',  scene: 'Library',     basePath: 'images/Low_Roughness/Library/' },
    { id: 'lr-livingroom',  section: 'Low Roughness',  scene: 'Living Room', basePath: 'images/Low_Roughness/Living Room/' },
  ];

  // Base frames
  const baseFrames = [
    { label: 'GS',       sideLabel: 'SplitSum', img: 'gs.png' },
    { label: 'SplitSum', sideLabel: 'SplitSum', img: 'ss.png' },
    { label: 'GS',       sideLabel: 'Ours',     img: 'gs.png' },
    { label: 'Ours',     sideLabel: 'Ours',     img: 'combo.png' },
  ];

  // Build sequence: 1,2 repeated 6 times then 3,4 repeated 6 times
  const frames = [];
  for (let i = 0; i < 6; i++) { frames.push(baseFrames[0]); frames.push(baseFrames[1]); }
  for (let i = 0; i < 6; i++) { frames.push(baseFrames[2]); frames.push(baseFrames[3]); }

  const FRAME_DURATION = 750;
  const container = document.getElementById('container');

  // Group by section
  const sections = {};
  scenes.forEach(s => {
    if (!sections[s.section]) sections[s.section] = [];
    sections[s.section].push(s);
  });

  Object.entries(sections).forEach(([sectionName, sceneList]) => {
    const sectionDiv = document.createElement('div');
    sectionDiv.className = 'roughness-section';
    sectionDiv.innerHTML = '<div class="roughness-title">' + sectionName + '</div>';

    sceneList.forEach(scene => {
      const html = `
        <div class="comparison">
          <div class="scene-title">${scene.scene}</div>
          <div class="flicker-wrapper">
            <div class="side-label" id="${scene.id}-side">SplitSum</div>
            <div class="flicker-box">
              <div class="label" id="${scene.id}-label">GS</div>
              <img id="${scene.id}-img" src="${scene.basePath}gs.png" alt="Flicker">
              </div>
          </div>
        </div>`;
      sectionDiv.insertAdjacentHTML('beforeend', html);
    });

    container.appendChild(sectionDiv);
  });

  scenes.forEach(scene => {
    let frame = 0;
    const label = document.getElementById(scene.id + '-label');
    const side  = document.getElementById(scene.id + '-side');
    const img   = document.getElementById(scene.id + '-img');

    function tick() {
      const f = frames[frame];
      label.textContent = f.label;
      side.textContent  = f.sideLabel;
      img.src = scene.basePath + f.img;
      frame = (frame + 1) % frames.length;
    }

    tick();
    setInterval(tick, FRAME_DURATION);
  });
</script>

</body>
</html>
