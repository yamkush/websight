<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SH-GS Comparison</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', Arial, sans-serif;
    background: #1a1a2e;
    color: #e0e0e0;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
    padding: 40px 20px;
  }
  h1 {
    font-size: 2rem;
    margin-bottom: 10px;
    color: #fff;
  }
  .roughness-section {
    width: 100%;
    max-width: 900px;
    margin-bottom: 50px;
  }
  .roughness-title {
    font-size: 1.6rem;
    text-align: center;
    margin-bottom: 30px;
    color: #7eb8da;
    border-bottom: 1px solid #333;
    padding-bottom: 10px;
  }
  .comparison {
    margin-bottom: 40px;
  }
  .scene-title {
    font-size: 1.2rem;
    text-align: center;
    margin-bottom: 16px;
    color: #aaa;
  }
  .pair {
    display: flex;
    gap: 10px;
    justify-content: center;
    padding: 0 10px;
  }
  .image-box {
    text-align: center;
    flex: 1;
    min-width: 0;
    max-width: 350px;
  }
  .image-box .label {
    font-size: 1.1rem;
    font-weight: 600;
    margin-bottom: 8px;
    height: 1.4em;
  }
  .image-box img {
    display: block;
    width: 100%;
    height: auto;
    border: 2px solid #333;
    border-radius: 4px;
  }
  .frame-indicator {
    text-align: center;
    margin-top: 12px;
    font-size: 0.85rem;
    color: #666;
  }

  @media (max-width: 600px) {
    h1 { font-size: 1.4rem; }
    .roughness-title { font-size: 1.2rem; }
    .pair {
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }
    .image-box {
      max-width: 90vw;
    }
  }
</style>
</head>
<body>

<nav style="margin-bottom:20px;font-size:1rem;">
  <a href="index.html" style="color:#7eb8da;margin-right:20px;font-weight:bold;">Image Comparison</a>
  <a href="flicker.html" style="color:#aaa;margin-right:20px;">Flicker Test</a>
  <a href="timing.html" style="color:#aaa;margin-right:20px;">Timing Chart</a>
  <a href="videos.html" style="color:#aaa;">Videos</a>
</nav>
<h1>SH-GS: Rendering Comparison</h1>

<div id="container"></div>

<script>
  const scenes = [
    { id: 'lr-bathroom',    scene: 'Bathroom',    basePath: 'images/Boma/Bathroom/' },
    { id: 'lr-kitchen',     scene: 'Kitchen',     basePath: 'images/Boma/Kitchen/' },
    { id: 'lr-library',     scene: 'Library',     basePath: 'images/Boma/Library/' },
    { id: 'lr-livingroom',  scene: 'Living Room', basePath: 'images/Boma/Living Room/' },
  ];

  const cacheBust = '?v=' + Date.now();

  const frames = [
    { leftLabel: 'GS',       rightLabel: 'GS',   leftImg: 'gs.png', rightImg: 'gs.png' },
    { leftLabel: 'SplitSum', rightLabel: 'Ours',  leftImg: 'ss.png', rightImg: 'combo.png' },
  ];

  const FRAME_DURATION = 1500;
  const container = document.getElementById('container');

  scenes.forEach(scene => {
    const html = `
      <div class="comparison">
        <div class="scene-title">${scene.scene}</div>
        <div class="pair">
          <div class="image-box">
            <div class="label" id="${scene.id}-label-left">GS</div>
            <img id="${scene.id}-img-left" src="${scene.basePath}gs.png${cacheBust}" alt="Left">
          </div>
          <div class="image-box">
            <div class="label" id="${scene.id}-label-right">GS</div>
            <img id="${scene.id}-img-right" src="${scene.basePath}gs.png${cacheBust}" alt="Right">
          </div>
        </div>
        <div class="frame-indicator" id="${scene.id}-indicator">Frame 1 / 2</div>
        <div style="text-align:center;color:#aaa;margin-top:16px;font-size:0.95rem;">Difference from GS (heatmap)</div>
        <div class="pair" style="margin-top:8px;">
          <div class="image-box">
            <div class="label">|GS − SplitSum|</div>
            <img src="${scene.basePath}diff_ss.png${cacheBust}" alt="Diff SplitSum">
          </div>
          <div class="image-box">
            <div class="label">|GS − Ours|</div>
            <img src="${scene.basePath}diff_combo.png${cacheBust}" alt="Diff Ours">
          </div>
        </div>
      </div>`;
    container.insertAdjacentHTML('beforeend', html);
  });

  // Animate all scenes
  scenes.forEach(scene => {
    let frame = 0;
    const labelLeft  = document.getElementById(scene.id + '-label-left');
    const labelRight = document.getElementById(scene.id + '-label-right');
    const imgLeft    = document.getElementById(scene.id + '-img-left');
    const imgRight   = document.getElementById(scene.id + '-img-right');
    const indicator  = document.getElementById(scene.id + '-indicator');

    function tick() {
      const f = frames[frame];
      labelLeft.textContent  = f.leftLabel;
      labelRight.textContent = f.rightLabel;
      imgLeft.src  = scene.basePath + f.leftImg + cacheBust;
      imgRight.src = scene.basePath + f.rightImg + cacheBust;
      indicator.textContent = 'Frame ' + (frame + 1) + ' / ' + frames.length;
      frame = (frame + 1) % frames.length;
    }

    tick();
    setInterval(tick, FRAME_DURATION);
  });
</script>

</body>
</html>
