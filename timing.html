<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rendering Time Comparison</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', Arial, sans-serif;
    background: #1a1a2e;
    color: #e0e0e0;
    padding: 30px 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  h1 { margin-bottom: 30px; color: #fff; }
  .chart-container {
    width: 100%;
    max-width: 900px;
    background: #16213e;
    border-radius: 8px;
    padding: 20px;
    margin-bottom: 40px;
  }
  .chart-container h2 {
    text-align: center;
    color: #7eb8da;
    margin-bottom: 15px;
    font-size: 1.1rem;
  }
</style>
</head>
<body>

<nav style="margin-bottom:20px;font-size:1rem;">
  <a href="index.html" style="color:#aaa;margin-right:20px;">Image Comparison</a>
  <a href="flicker.html" style="color:#aaa;margin-right:20px;">Flicker Test</a>
  <a href="timing.html" style="color:#7eb8da;font-weight:bold;">Timing Chart</a>
</nav>
<h1>GPU Run Time</h1>

<div class="chart-container"><h2>Mean Render Time (ms) &mdash; Averaged</h2><canvas id="avgMs"></canvas></div>
<div class="chart-container"><h2>Mean Render Time (ms) &mdash; Per Environment</h2><canvas id="perEnvMs"></canvas></div>

<script>
const environments = [
  'Boma', 'Ocean', 'Paris', 'Ruins', 'SH', 'Spot', 'Yokohama'
];

const methods = [
  'fourier_L3', 'fourier_L4', 'fourier_L5',
  'combo_L3', 'combo_L4', 'combo_L5',
  'splitsum', 'gs'
];

// Mean ms per [env][method]
const meanMs = [
  // Boma
  [0.215032, 0.235893, 0.260763, 0.240482, 0.245059, 0.270268, 0.211517, 54.489821],
  // Ocean
  [0.218351, 0.237969, 0.260180, 0.235152, 0.246687, 0.271265, 0.212565, 40.850783],
  // Paris
  [0.221092, 0.239783, 0.262095, 0.238296, 0.250631, 0.275871, 0.230782, 54.883749],
  // Ruins
  [0.221394, 0.238961, 0.264156, 0.239113, 0.250480, 0.273530, 0.213677, 53.007250],
  // SH
  [0.217875, 0.244770, 0.266709, 0.237146, 0.247021, 0.273400, 0.209231, 39.914498],
  // Spot
  [0.220882, 0.241524, 0.263595, 0.232209, 0.246266, 0.270944, 0.209828, 36.147159],
  // Yokohama
  [0.220321, 0.239802, 0.264451, 0.239460, 0.251623, 0.276367, 0.214817, 42.291860],
];

const colorMap = m => {
  if (m.startsWith('fourier')) return '#3498db';
  if (m.startsWith('combo'))   return '#e67e22';
  if (m === 'splitsum')        return '#9b59b6';
  return '#95a5a6';
};
const colors = methods.map(colorMap);

function avgAcrossEnvs(data) {
  return methods.map((_, m) => {
    let sum = 0;
    for (let e = 0; e < data.length; e++) sum += data[e][m];
    return sum / data.length;
  });
}

function makeAvgChart(canvasId, data, unit, yType) {
  const avg = avgAcrossEnvs(data);
  new Chart(document.getElementById(canvasId), {
    type: 'bar',
    data: {
      labels: methods,
      datasets: [{ data: avg, backgroundColor: colors, borderColor: colors, borderWidth: 1 }]
    },
    options: {
      responsive: true,
      plugins: {
        legend: { display: false },
        tooltip: { callbacks: { label: ctx => ctx.raw.toFixed(3) + ' ' + unit } }
      },
      scales: {
        x: { ticks: { color: '#ccc', font: { size: 11 } }, grid: { color: '#333' } },
        y: { type: yType, title: { display: true, text: unit, color: '#aaa' }, ticks: { color: '#aaa' }, grid: { color: '#333' } }
      }
    }
  });
}

function makePerEnvChart(canvasId, data, unit, yType) {
  const datasets = methods.map((method, m) => ({
    label: method,
    data: environments.map((_, e) => data[e][m]),
    backgroundColor: colors[m],
    borderColor: colors[m],
    borderWidth: 1,
  }));
  new Chart(document.getElementById(canvasId), {
    type: 'bar',
    data: { labels: environments, datasets },
    options: {
      responsive: true,
      plugins: {
        legend: { labels: { color: '#ccc', font: { size: 11 } } },
        tooltip: { callbacks: { label: ctx => ctx.dataset.label + ': ' + ctx.raw.toFixed(3) + ' ' + unit } }
      },
      scales: {
        x: { ticks: { color: '#aaa', font: { size: 10 } }, grid: { color: '#333' } },
        y: { type: yType, title: { display: true, text: unit, color: '#aaa' }, ticks: { color: '#aaa' }, grid: { color: '#333' } }
      }
    }
  });
}

makeAvgChart('avgMs', meanMs, 'ms', 'logarithmic');
makePerEnvChart('perEnvMs', meanMs, 'ms', 'logarithmic');
</script>

</body>
</html>
