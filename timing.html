<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rendering Time Comparison</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', Arial, sans-serif;
    background: #1a1a2e;
    color: #e0e0e0;
    padding: 30px 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  h1 { margin-bottom: 30px; color: #fff; }
  .chart-container {
    width: 100%;
    max-width: 900px;
    background: #16213e;
    border-radius: 8px;
    padding: 20px;
    margin-bottom: 40px;
  }
  .chart-container h2 {
    text-align: center;
    color: #7eb8da;
    margin-bottom: 15px;
    font-size: 1.1rem;
  }
</style>
</head>
<body>

<nav style="margin-bottom:20px;font-size:1rem;">
  <a href="index.html" style="color:#aaa;margin-right:20px;">Image Comparison</a>
  <a href="timing.html" style="color:#7eb8da;font-weight:bold;">Timing Chart</a>
</nav>
<h1>Performance Benchmarks</h1>

<div class="chart-container"><h2>Mean Render Time (ms) &mdash; Averaged</h2><canvas id="avgMs"></canvas></div>
<div class="chart-container"><h2>Mean Render Time (ms) &mdash; Per Environment</h2><canvas id="perEnvMs"></canvas></div>

<script>
const environments = [
  'abandoned_bakery', 'belfast_sunset', 'blue_photo_studio',
  'little_paris', 'peppermint_powerplant', 'pretville_street',
  'solitude_night', 'spruit_sunrise'
];

const methods = [
  'fourier_L4', 'fourier_L4_zxzxz', 'fourier_L5',
  'combo_L3', 'combo_L4', 'combo_L4_zxzxz', 'combo_L5',
  'splitsum', 'gs'
];

// Mean ms per [env][method] — fourier_L3 removed
const meanMs = [
  [0.299846, 0.285207, 0.386979, 0.323980, 0.277876, 0.225257, 0.371665, 0.264332, 50.920353],
  [0.264425, 0.240058, 0.381068, 0.236195, 0.284183, 0.224209, 0.378601, 0.195770, 51.230452],
  [0.266636, 0.244503, 0.364474, 0.244038, 0.271337, 0.233937, 0.391494, 0.213830, 51.573411],
  [0.289862, 0.214947, 0.388794, 0.268102, 0.271779, 0.247273, 0.372387, 0.200378, 53.577228],
  [0.270057, 0.227537, 0.387235, 0.248017, 0.293190, 0.220369, 0.368454, 0.212713, 49.629779],
  [0.273408, 0.220742, 0.390796, 0.239290, 0.270313, 0.225373, 0.409740, 0.233332, 48.455729],
  [0.266682, 0.216204, 0.387654, 0.258839, 0.271407, 0.222767, 0.372117, 0.210246, 53.121191],
  [0.288349, 0.226700, 0.363590, 0.237498, 0.281088, 0.224745, 0.390167, 0.198260, 54.764325],
];


const colorMap = m => {
  if (m.startsWith('fourier')) return '#3498db';
  if (m.startsWith('combo'))   return '#e67e22';
  if (m === 'splitsum')        return '#9b59b6';
  return '#95a5a6';
};
const colors = methods.map(colorMap);

function avgAcrossEnvs(data) {
  return methods.map((_, m) => {
    let sum = 0;
    for (let e = 0; e < data.length; e++) sum += data[e][m];
    return sum / data.length;
  });
}

function makeAvgChart(canvasId, data, unit, yType) {
  const avg = avgAcrossEnvs(data);
  new Chart(document.getElementById(canvasId), {
    type: 'bar',
    data: {
      labels: methods,
      datasets: [{ data: avg, backgroundColor: colors, borderColor: colors, borderWidth: 1 }]
    },
    options: {
      responsive: true,
      plugins: {
        legend: { display: false },
        tooltip: { callbacks: { label: ctx => ctx.raw.toFixed(3) + ' ' + unit } }
      },
      scales: {
        x: { ticks: { color: '#ccc', font: { size: 11 } }, grid: { color: '#333' } },
        y: { type: yType, title: { display: true, text: unit, color: '#aaa' }, ticks: { color: '#aaa' }, grid: { color: '#333' } }
      }
    }
  });
}

function makePerEnvChart(canvasId, data, unit, yType) {
  const datasets = methods.map((method, m) => ({
    label: method,
    data: environments.map((_, e) => data[e][m]),
    backgroundColor: colors[m],
    borderColor: colors[m],
    borderWidth: 1,
  }));
  new Chart(document.getElementById(canvasId), {
    type: 'bar',
    data: { labels: environments, datasets },
    options: {
      responsive: true,
      plugins: {
        legend: { labels: { color: '#ccc', font: { size: 11 } } },
        tooltip: { callbacks: { label: ctx => ctx.dataset.label + ': ' + ctx.raw.toFixed(3) + ' ' + unit } }
      },
      scales: {
        x: { ticks: { color: '#aaa', font: { size: 10 } }, grid: { color: '#333' } },
        y: { type: yType, title: { display: true, text: unit, color: '#aaa' }, ticks: { color: '#aaa' }, grid: { color: '#333' } }
      }
    }
  });
}

makeAvgChart('avgMs', meanMs, 'ms', 'logarithmic');
makePerEnvChart('perEnvMs', meanMs, 'ms', 'logarithmic');
</script>

</body>
</html>
